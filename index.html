<!doctype html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body { overflow-x: hidden; max-width: 100vw; background-color: #0d0d0d; }
  </style>

  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/top.png" sizes="48x48" />
  <link rel="apple-touch-icon" href="/top.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rosint — Search Deleted Reddit Posts</title>

  <!-- Primary SEO -->
  <meta name="description" content="Search deleted posts, removed comments, and private Reddit accounts using distributed open-source archives. Powered by Arctic Shift and PullPush." />
  <meta name="keywords" content="reddit osint, deleted reddit posts, removed reddit comments, reddit archive, reddit search" />
  <link rel="canonical" href="https://rosint.dev/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rosint.dev/" />
  <meta property="og:title" content="Rosint — Search deleted & private Reddit posts" />
  <meta property="og:description" content="Recover deleted posts, removed comments, and browse private Reddit accounts using distributed open-source archives." />
  <meta property="og:image" content="https://rosint.dev/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Rosint - Search deleted & private Reddit posts" />
  <meta name="twitter:description" content="Recover deleted posts, removed comments, and browse private Reddit accounts using distributed open-source archives." />
  <meta name="twitter:image" content="https://rosint.dev/og-image.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#0d0d0d" />

  <!-- Structured data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Rosint",
      "url": "https://rosint.dev",
      "description": "Search deleted posts, removed comments, and private Reddit accounts using distributed open-source archives.",
      "applicationCategory": "SearchApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
